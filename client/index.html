    <!-- Google Analytics 4 - Deferred for Performance -->
    <script>
      // Buffer events until GA is fully initialized to prevent data loss
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      
      let gaReady = false;
      let eventBuffer = [];
      
      // Global function for tracking conversion events (buffers until GA config runs)
      window.trackEvent = function(eventName, eventParams) {
        if (gaReady) {
          gtag('event', eventName, eventParams);
        } else {
          eventBuffer.push({ name: eventName, params: eventParams });
        }
        console.log('Event tracked:', eventName, eventParams);
      };
      
      // Load GA after page is interactive (reduces TBT by ~200ms)
      function loadGoogleAnalytics() {
        const script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-T43ZF7PB33';
        script.onload = function() {
          gtag('js', new Date());
          gtag('config', 'G-T43ZF7PB33', {
            'page_title': document.title,
            'page_location': window.location.href
          });
          
          // Flush buffered events now that GA is configured
          gaReady = true;
          eventBuffer.forEach(function(evt) {
            gtag('event', evt.name, evt.params);
          });
          eventBuffer = [];
        };
        document.head.appendChild(script);
      }
      
      // Use requestIdleCallback for optimal defer timing, fallback to setTimeout
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadGoogleAnalytics, { timeout: 2000 });
      } else {
        setTimeout(loadGoogleAnalytics, 1000);
      }
    </script>
    
    <title>MetaHers</title>
    
    <!-- Theme initialization script - prevents flash of wrong theme -->
    <script>
      // Apply theme class immediately before React loads (default to dark mode)
      (function() {
        const savedTheme = localStorage.getItem('metahers-theme');
        const theme = savedTheme || 'dark'; // Default to dark mode (Web3 aesthetic)
        document.documentElement.classList.add(theme);
      })();
    </script>
