<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="application-name" content="MetaHers" />
    <meta name="apple-mobile-web-app-title" content="MetaHers" />
    <meta name="description" content="MetaHers - AI and Web3 education for women in tech" />
    <meta name="theme-color" content="#0D0D0F" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MetaHers Mind Spa" />
    <meta property="og:title" content="MetaHers Mind Spa - AI & Web3 Education for Women" />
    <meta property="og:description" content="Learn AI and Web3 through a luxury spa-inspired experience. 30-day thought leadership journeys, AI training, and expert coaching for women in tech." />
    <meta property="og:image" content="/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MetaHers Mind Spa - AI & Web3 Education for Women" />
    <meta name="twitter:description" content="Learn AI and Web3 through a luxury spa-inspired experience. 30-day thought leadership journeys, AI training, and expert coaching for women in tech." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Google Analytics 4 - ACTIVE -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T43ZF7PB33"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-T43ZF7PB33', {
        'page_title': document.title,
        'page_location': window.location.href
      });
    </script>
    
    <!-- Event Tracking Helper Function -->
    <script>
      // Global function for tracking conversion events
      window.trackEvent = function(eventName, eventParams) {
        if (typeof gtag !== 'undefined') {
          gtag('event', eventName, eventParams);
        }
        console.log('Event tracked:', eventName, eventParams);
      };
    </script>
    
    <title>MetaHers</title>
    
    <!-- Theme initialization script - prevents flash of wrong theme -->
    <script>
      // Apply theme class immediately before React loads (default to dark mode)
      (function() {
        const savedTheme = localStorage.getItem('metahers-theme');
        const theme = savedTheme || 'dark'; // Default to dark mode (Web3 aesthetic)
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
